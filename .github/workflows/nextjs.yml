name: Redirect GitHub Pages to Vercel

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare redirect site
        run: |
          mkdir -p out
          cat > out/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <meta http-equiv="refresh" content="0; url=https://pathvisualizer-pzr3.vercel.app/" />
              <title>PathViz</title>
              <script>
                window.location.replace("https://pathvisualizer-pzr3.vercel.app/");
              </script>
            </head>
            <body>
              <p>Redirecting to <a href="https://pathvisualizer-pzr3.vercel.app/">https://pathvisualizer-pzr3.vercel.app/</a>...</p>
            </body>
          </html>
          EOF
          cp out/index.html out/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
